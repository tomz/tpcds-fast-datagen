name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pytest-cov

      - name: Run tests
        run: pytest -v --cov=tpcds_fast_datagen --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel + sdist
        run: |
          pip install build
          python -m build
      - name: Check artifacts
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  install-dsdgen-from-source:
    # Exercises `tpcds-gen install-dsdgen --from-source` on a modern GCC
    # (Ubuntu 24.04 ships gcc-13/gcc-14 which reject tpcds-kit's K&R prototypes
    # unless we inject -Wno-error=implicit-int via LINUX_CFLAGS). Catches
    # regressions in the CLI's make-invocation fix.
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc bison flex
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run install-dsdgen --from-source
        run: tpcds-gen install-dsdgen --from-source
      - name: Run doctor
        run: tpcds-gen doctor
      - name: Generate SF=1 end-to-end
        run: |
          tpcds-gen --scale 1 --engine dsdgen --output /tmp/sf1 --overwrite
          python -c "import pyarrow.parquet as pq; t=pq.read_table('/tmp/sf1/date_dim'); assert t.num_rows==73049, f'date_dim has {t.num_rows} rows, expected 73049'; print('date_dim rows OK')"
